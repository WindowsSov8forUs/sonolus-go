site_name: sonolus-go
site_description: 全 Go 语言实现的 Sonolus 引擎编译工具链
repo_url: https://github.com/WindowsSov8forUs/sonolus-go
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - content.code.copy
    - navigation.tabs

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - admonition
  - tables

nav:
  - 首页: index.md
  - 快速入门: getting-started.md
  - DSL 语言参考: FRONTEND_SYNTAX.md
  - 编译器架构: architecture.md
  - CLI 参考: cli.md
  - 优化器: optimization.md
