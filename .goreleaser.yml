# GoReleaser configuration — cross-compile sonolus-go for all major platforms.
# Triggered by .github/workflows/release.yml on tag push (v*).
#
# Local dry-run:  goreleaser release --snapshot --clean --skip=publish

version: 2

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: sonolus-go
    main: ./cmd/sonolus-go
    binary: sonolus-go
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    # All 6 combos (3 OS × 2 arch) are valid — no ignore needed.

archives:
  - id: default
    builds: [sonolus-go]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: WindowsSov8forUs
    name: sonolus-go
  prerelease: auto
  draft: false
  footer: |
    ### 安装

    ```bash
    # 下载对应平台的二进制，解压后放到 PATH 即可

    # Linux/macOS
    tar xzf sonolus-go_*_linux_x86_64.tar.gz
    sudo mv sonolus-go /usr/local/bin/

    # Windows (PowerShell)
    Expand-Archive sonolus-go_*_windows_x86_64.zip -DestinationPath .
    move sonolus-go.exe C:\Windows\System32\
    ```

    ### 用法

    ```bash
    sonolus-go build -m play engine.go
    sonolus-go serve engine.go
    ```
