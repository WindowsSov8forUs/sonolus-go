name: Release

# Trigger on version tag push. Creates cross-platform binaries,
# packages them into archives, and uploads to a GitHub Release.
#
# To cut a release:
#   git tag -a v1.1.0-rc.1 -m "v1.1.0-rc.1"
#   git push origin v1.1.0-rc.1

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  # ── Pre-flight: run tests on all platforms ──
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go test ./...
      - run: go vet ./...

  # ── Build + release via GoReleaser ──
  goreleaser:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for changelog generation

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Configure git for private repos
        run: |
          git config --global url."https://${GITHUB_TOKEN}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "v2.12.7"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOPRIVATE: github.com/WindowsSov8forUs/*
