name: CI
on: [push, pull_request]
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Clone sibling dependency repos (required by local replace directives in go.mod).
      # git clone is used instead of actions/checkout because the paths are outside
      # the workspace, which actions/checkout@v4 refuses.
      # Remove these steps once the repos are published as versioned modules.
      - run: git clone --depth 1 https://github.com/WindowsSov8forUs/sonolus-core-go.git ../sonolus-core-go
      - run: git clone --depth 1 https://github.com/WindowsSov8forUs/sonolus-pack-go.git ../sonolus-pack-go || true
      - run: git clone --depth 1 https://github.com/WindowsSov8forUs/sonolus-server-go.git ../sonolus-server-go || true

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go test ./... -count=1
      # Verify CLI binary builds and sub-commands are wired correctly.
      - run: go build -o sonolus-go.exe .
      - run: ./sonolus-go -version
        continue-on-error: true
      # Smoke-test pack command: compile a minimal engine and verify output.
      - name: Smoke test pack
        run: |
          printf 'package p\ntype N struct {}\nfunc (n N) Initialize() {}\n' > ci_engine.go
          ./sonolus-go pack ci_engine.go
          test -d dist/ci_engine || (echo "pack: output directory missing" && exit 1)
        shell: bash
      # Smoke-test host command: start server briefly and verify endpoints respond.
      - name: Smoke test host
        run: |
          printf 'package p\ntype N struct {}\nfunc (n N) Initialize() {}\n' > ci_engine.go
          ./sonolus-go host ci_engine.go -addr :19876 &
          sleep 3
          curl -sSf http://localhost:19876/sonolus/engines/info > /dev/null || (echo "host: /info failed" && exit 1)
          curl -sSf http://localhost:19876/sonolus/engine/configuration > /dev/null || (echo "host: /configuration failed" && exit 1)
          curl -sSf http://localhost:19876/sonolus/engine/play-data > /dev/null || (echo "host: /play-data failed" && exit 1)
          kill %1 2>/dev/null || true
        shell: bash
        continue-on-error: true
      - run: go vet ./...
      - run: gofmt -s -l internal cmd sonolus > fmt.out && test ! -s fmt.out || (cat fmt.out && exit 1)
        shell: bash
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: WindowsSov8forUs/sonolus-core-go
          path: ../sonolus-core-go
      - uses: actions/checkout@v4
        with:
          repository: WindowsSov8forUs/sonolus-pack-go
          path: ../sonolus-pack-go
        continue-on-error: true
      - uses: actions/checkout@v4
        with:
          repository: WindowsSov8forUs/sonolus-server-go
          path: ../sonolus-server-go
        continue-on-error: true
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go test -fuzz=FuzzCompilePlay -fuzztime=60s ./internal/compiler/engine/
