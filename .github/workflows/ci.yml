name: CI
on: [push, pull_request]
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'
      - run: go test ./...
      - run: go vet ./...
      - run: go build ./cmd/sonolus-go/

  vulnerability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'
      - run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'
      - run: go test -run '^$' -fuzz=FuzzStaticValueEval -fuzztime=30s ./internal/compiler/source/
      - run: go test -run '^$' -fuzz=FuzzCompiledCallbackOptimizationSemantics -fuzztime=30s ./internal/compiler/
